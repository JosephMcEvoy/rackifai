name: Update Device Catalog

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 6 AM UTC
  workflow_dispatch: # Manual trigger

jobs:
  update-catalog:
    name: Import NetBox DeviceType Library
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Clone NetBox DeviceType Library
        run: git clone --depth 1 https://github.com/netbox-community/devicetype-library /tmp/devicetype-library

      - name: Run import script
        run: npx tsx scripts/import-netbox-catalog.ts /tmp/devicetype-library

      - name: Check for changes
        id: diff
        run: |
          CHANGED=false
          for f in src/lib/netbox-catalog.json src/lib/netbox-rack-catalog.json src/lib/netbox-module-catalog.json; do
            if ! git diff --quiet "$f" 2>/dev/null; then
              CHANGED=true
            fi
          done
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Create PR with updated catalogs
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="chore/update-device-catalog-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add src/lib/netbox-catalog.json src/lib/netbox-rack-catalog.json src/lib/netbox-module-catalog.json
          DEVICE_COUNT=$(node -e "const d=require('./src/lib/netbox-catalog.json'); console.log(d.deviceCount)")
          RACK_COUNT=$(node -e "const d=require('./src/lib/netbox-rack-catalog.json'); console.log(d.rackTypeCount)")
          MODULE_COUNT=$(node -e "const d=require('./src/lib/netbox-module-catalog.json'); console.log(d.moduleTypeCount)")
          git commit -m "chore: update catalogs from NetBox library ($DEVICE_COUNT devices, $RACK_COUNT racks, $MODULE_COUNT modules)"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: update catalogs ($DEVICE_COUNT devices, $RACK_COUNT racks, $MODULE_COUNT modules)" \
            --body "$(cat <<'EOF'
          ## Summary
          - Automated weekly import from [netbox-community/devicetype-library](https://github.com/netbox-community/devicetype-library)
          - Devices: $DEVICE_COUNT | Rack types: $RACK_COUNT | Module types: $MODULE_COUNT

          This PR was auto-generated by the `update-catalog` workflow.
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
